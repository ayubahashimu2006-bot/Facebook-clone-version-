<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Social Login</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, Helvetica, sans-serif; }

    body {
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      display: flex;
      gap: 60px;
      align-items: center;
    }

    .left {
      max-width: 400px;
    }

    .left h1 {
      color: #1877f2;
      font-size: 56px;
      font-weight: bold;
    }

    .left p {
      font-size: 20px;
      margin-top: 10px;
    }

    .right {
      background: #fff;
      padding: 20px;
      width: 350px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
    }

    input:focus {
      outline: none;
      border: 1px solid #1877f2;
      box-shadow: 0 0 0 2px #e7f3ff;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: #1877f2;
      border: none;
      color: white;
      font-size: 18px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
    }

    .login-btn:hover {
      background: #166fe5;
    }

    .forgot {
      text-align: center;
      margin: 12px 0;
    }

    .forgot a {
      text-decoration: none;
      color: #1877f2;
      font-size: 14px;
    }

    hr {
      margin: 20px 0;
      border: 0.5px solid #ddd;
    }

    .create-btn {
      display: block;
      margin: auto;
      background: #42b72a;
      color: white;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
      font-weight: bold;
      width: 70%;
      text-decoration: none;
    }

    .create-btn:hover {
      background: #36a420;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #777;
    }

    .notice {
      font-size: 11px;
      color: #999;
      margin-top: 10px;
      text-align: center;
    }

    @media (max-width: 900px) {
      .container {
        flex-direction: column;
        text-align: center;
      }

      .left h1 {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="left">
      <h1>facebook</h1>
      <p>Connect with friends and the world around you.</p>
    </div>

    <div class="right">
      <form onsubmit="return false;">
        <input type="text" placeholder="Email or phone number" />
        <input type="password" placeholder="Password" />

        <button class="login-btn">Log In</button>

        <div class="forgot">
          <a href="#">Forgotten password?</a>
        </div>

        <hr>

        <a href="#" class="create-btn">Create New Account</a>

        <div class="notice">
          Educational demo interface only (no data is collected)
        </div>
      </form>
    </div>
  </div>

  <div class="footer">
    Demo Project • Cybersecurity Awareness
  </div>

</body>
</html>
