<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login</title>

<style>
:root{
  --blue:#1877f2;
  --bg:#f0f2f5;
  --text:#1c1e21;
  --muted:#65676b;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
}

body{
  background:var(--bg);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  display:flex;
  gap:60px;
  align-items:center;
}

.left h1{
  color:var(--blue);
  font-size:60px;
  letter-spacing:-1px;
}

.left p{
  font-size:22px;
  max-width:400px;
  color:var(--text);
}

.card{
  background:#fff;
  width:360px;
  padding:20px;
  border-radius:10px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

input{
  width:100%;
  padding:14px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:6px;
  font-size:16px;
}

input:focus{
  outline:none;
  border-color:var(--blue);
  box-shadow:0 0 0 2px #e7f3ff;
}

.password-box{
  position:relative;
}

.eye{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:18px;
  color:var(--muted);
  user-select:none;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  background:var(--blue);
  border:none;
  color:#fff;
  font-size:18px;
  font-weight:600;
  border-radius:6px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#166fe5;
}

.link{
  display:block;
  text-align:center;
  margin:12px 0;
  color:var(--blue);
  text-decoration:none;
  font-size:14px;
}

.divider{
  height:1px;
  background:#ddd;
  margin:16px 0;
}

.create{
  display:block;
  width:70%;
  margin:0 auto;
  padding:12px;
  text-align:center;
  background:#42b72a;
  color:#fff;
  border-radius:6px;
  font-weight:600;
  text-decoration:none;
}

.create:hover{
  background:#36a420;
}

.footer{
  text-align:center;
  margin-top:18px;
  font-size:12px;
  color:var(--muted);
}

/* mobile */
@media(max-width:900px){
  .container{
    flex-direction:column;
    text-align:center;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="left">
    <h1>FACEBOOK</h1>
    <p>Connect with friends .</p>
  </div>

  <div class="card">

    <form onsubmit="return false;">

      <input type="text" placeholder="Mobile number or email address" />

      <div class="password-box">
        <input id="pass" type="password" placeholder="Password" />
        <span class="eye" onclick="togglePass()"></span>
      </div>

      <button>Log In</button>

      <a class="link" href="#">Forgotten password?</a>

      <div class="divider"></div>

      <a class="create" href="#">Create new account</a>

    </form>

    <div class="footer">
      Meta · About · Help · More · META
    </div>

  </div>

</div>

<script>
function togglePass(){
  const input = document.getElementById("pass");
  input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
