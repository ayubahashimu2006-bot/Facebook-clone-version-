<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f0f2f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  display:flex;
  gap:50px;
  align-items:center;
}

.brand h1{
  font-size:54px;
  color:#2b7cff;
  margin-bottom:10px;
}

.brand p{
  font-size:20px;
  color:#333;
  max-width:400px;
}

.card{
  width:360px;
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

input{
  width:100%;
  padding:14px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:6px;
  font-size:15px;
}

input:focus{
  outline:none;
  border-color:#2b7cff;
}

.password-wrap{
  position:relative;
}

.eye{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:#666;
}

button{
  width:100%;
  padding:14px;
  background:#2b7cff;
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#1f6be0;
}

.link{
  text-align:center;
  margin:10px 0;
  font-size:14px;
  color:#2b7cff;
  text-decoration:none;
}

.divider{
  height:1px;
  background:#ddd;
  margin:15px 0;
}

.create{
  display:block;
  text-align:center;
  padding:12px;
  background:#42b72a;
  color:#fff;
  border-radius:6px;
  text-decoration:none;
  font-weight:bold;
}

.create:hover{
  background:#36a420;
}

@media(max-width:800px){
  .container{
    flex-direction:column;
    text-align:center;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="brand">
    <h1>SocialHub</h1>
    <p>Connect with people and stay updated anytime, anywhere.</p>
  </div>

  <div class="card">

    <input type="text" placeholder="Mobile number or email">

    <div class="password-wrap">
      <input id="pass" type="password" placeholder="Password">
      <span class="eye" onclick="toggle()">👁</span>
    </div>

    <button>Log In</button>

    <a class="link" href="#">Forgot password?</a>

    <div class="divider"></div>

    <a class="create" href="#">Create New Account</a>

  </div>

</div>

<script>
function toggle(){
  const p = document.getElementById("pass");
  p.type = (p.type === "password") ? "text" : "password";
}
</script>

</body>
</html>
